name: Build all templates (reusable)

on:
  workflow_call:

jobs:
  build-common:
    name: Build common package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build and Test .NET solution
        uses: Arbeidstilsynet/action-dotnet-build@07de1f5dd65d1ee5b33d5ac9d90babcd5b6f63e5 # v3
        with:
          working-directory: "./templates/common-package/SamplePackage"

  build-hexarch:
    name: Build hexarch package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build and Test .NET solution
        uses: Arbeidstilsynet/action-dotnet-build@07de1f5dd65d1ee5b33d5ac9d90babcd5b6f63e5 # v3
        with:
          working-directory: "./templates/hexarch"
