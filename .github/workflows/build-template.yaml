name: Build all templates (reusable)

on:
  workflow_call:

jobs:
  build-common:
    name: Build common package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - name: Build and Test .NET solution
        uses: Arbeidstilsynet/action-dotnet-build@51403325a6c4ccdc45545112d125177e0f0f4969 # v1
        with:
          working-directory: "./templates/common-package/SamplePackage"

  build-hexarch:
    name: Build hexarch package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - name: Build and Test .NET solution
        uses: Arbeidstilsynet/action-dotnet-build@51403325a6c4ccdc45545112d125177e0f0f4969 # v1
        with:
          working-directory: "./templates/hexarch"
