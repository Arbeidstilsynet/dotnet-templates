include:
  - compose.infra.yaml

networks:
  HexagonalArchitectureTemplateDocker_network:
    name: HexagonalArchitectureTemplateDocker_network
    external: false

services:
  api:
    build:
      context: .
    ports:
      - "8080:8080"
    networks:
      - HexagonalArchitectureTemplateDocker_network
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Infrastructure__ConnectionString: Host=postgres;Port=5432;Database=demo_db;Username=postgres;Password=postgres
      OTEL_EXPORTER_OTLP_ENDPOINT: http://monitoring_otel:4317
    depends_on:
      postgres:
        condition: service_healthy
