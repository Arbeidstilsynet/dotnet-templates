networks:
  HexagonalArchitectureTemplateDocker_network:
    name: HexagonalArchitectureTemplateDocker_network
    external: false

services:
  postgres:
    image: postgres:17-alpine@sha256:fff4f6633986df3188f3322cf3bebf6da57e29fdaf35b402a64e7767e00092cc
    networks:
      - HexagonalArchitectureTemplateDocker_network
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=demo_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 5s
      retries: 10

  monitoring_otel:
    container_name: monitoring_otel
    image: grafana/otel-lgtm@sha256:10c9cf2db84bfc63477c026718bae52800daf1c270fafe7687628d84b4c34fd4
    networks:
      - HexagonalArchitectureTemplateDocker_network
    restart: always
    profiles:
      - monitoring
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "4000:3000" # Grafana UI

volumes:
  postgres-data:
